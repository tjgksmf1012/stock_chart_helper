name: Trigger Render deploy

# Render의 GitHub App 웹훅이 커밋 푸시에 반응하지 않는 경우를 대비한 백업 트리거.
# RENDER_DEPLOY_HOOK 시크릿이 설정돼 있으면 푸시마다 Render 배포를 직접 트리거한다.
# 시크릿 설정: Render 대시보드 → Settings → Deploy Hook 복사 →
#   GitHub repo → Settings → Secrets and variables → Actions → New secret (RENDER_DEPLOY_HOOK)

on:
  push:
    branches: [main]
    # 백엔드 관련 변경에만 발동 — 프론트 전용 커밋이 백엔드를 재배포시키면
    # Render free tier는 무중단 전환이 없어 재시작 동안 503이 발생한다.
    paths:
      - "backend/**"
      - "render.yaml"
      - ".github/workflows/render-deploy.yml"

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call Render deploy hook
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK secret not set — skipping (Render's own webhook may handle it)."
            exit 0
          fi
          curl -fsS -X POST "$HOOK" && echo "Render deploy triggered."
