name: Keep Render Backend Alive

on:
  schedule:
    # Every 10 minutes (GitHub Actions minimum is 5 min)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          echo "Pinging Render backend..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://stock-chart-helper-api.onrender.com/health)
          echo "Response status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Backend is alive!"
          else
            echo "Backend returned $STATUS - may still be warming up (expected during cold start)"
          fi
