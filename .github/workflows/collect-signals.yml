# 매일 장마감 후 신호 수집 — 로컬 앱을 켜지 않아도 실측(종이매매) 표본이 쌓인다.
# 결과는 backend/collected/paper_signals.jsonl 에 append 커밋되고,
# 로컬 백엔드가 시작 시/16:25에 raw URL로 받아 DB에 동기화한다.
name: collect-signals

on:
  schedule:
    - cron: "35 7 * * 1-5" # 16:35 KST (UTC+9), 평일
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: collect-signals
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Collect signals
        working-directory: backend
        run: python scripts/collect_signals.py

      - name: Commit collected signals
        run: |
          if git diff --quiet -- backend/collected/paper_signals.jsonl; then
            echo "새 신호 없음 — 커밋 생략"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/collected/paper_signals.jsonl
          git commit -m "chore(lab): 신호 자동 수집 $(date -u +%Y-%m-%d)"
          git push
