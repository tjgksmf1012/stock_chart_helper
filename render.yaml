services:
  - type: web
    name: stock-chart-helper-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      # Redis
      # Leave blank to use the in-memory fallback cache.
      - key: REDIS_URL
        value: ""

      # CORS
      # Add your deployed frontend URL and keep localhost for local development.
      - key: ALLOWED_ORIGINS
        value: "https://frontend-mu-sooty-i4662dxm4r.vercel.app,http://localhost:5173"

      # KIS API
      # Leave blank if you want to rely on public sources only.
      - key: KIS_APP_KEY
        value: ""
      - key: KIS_APP_SECRET
        value: ""
      - key: KIS_ACCOUNT_NO
        value: ""
      - key: KIS_ENV
        value: "auto"

      # Security
      - key: SECRET_KEY
        generateValue: true
