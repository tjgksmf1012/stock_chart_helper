services:
  # ── FastAPI backend ───────────────────────────────────────────────────────────
  - type: web
    name: stock-chart-helper-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free        # upgrade to "starter" for persistent disk
    healthCheckPath: /health
    envVars:
      # Redis — point to an Upstash or Render Redis instance
      # Leave blank to use the built-in in-memory fallback (data lost on restart)
      - key: REDIS_URL
        value: ""          # e.g. redis://default:password@host:6379

      # CORS — comma-separated list of allowed origins
      # Add your Vercel frontend URL once it's deployed
      - key: ALLOWED_ORIGINS
        value: "https://stock-chart-helper.vercel.app,http://localhost:5173"

      # KIS API (optional — leave blank to use public pykrx data only)
      - key: KIS_APP_KEY
        value: ""
      - key: KIS_APP_SECRET
        value: ""
      - key: KIS_ACCOUNT_NO
        value: ""
      - key: KIS_ENV
        value: "auto"

      # Security
      - key: SECRET_KEY
        generateValue: true
