# ⚠️ NOTE: 이 서비스는 Render 대시보드에서 수동 생성됐기 때문에 (Blueprint 아님)
# 이 파일의 envVars는 실제 배포에 적용되지 않습니다. 환경 변수는 Render 대시보드
# → Environment 에서 직접 관리하세요. 이 파일은 권장 설정의 문서로만 사용됩니다.
services:
  - type: web
    name: stock-chart-helper-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      # Redis URL은 Render 대시보드에서 직접 관리 (render.yaml로 덮어쓰면 안 됨)
      # Upstash Redis 연결 중 — 수동으로 REDIS_URL 환경변수 설정 유지할 것

      # Keep-alive (Render free tier 15분 슬립 방지)
      - key: ENABLE_PLATFORM_KEEPALIVE
        value: "true"
      - key: SELF_HEALTHCHECK_URL
        value: "https://stock-chart-helper-api.onrender.com/health"

      # 시작 직후 스캔 (서버 재시작 후 바로 데이터 갱신)
      - key: STARTUP_DAILY_SCAN_ENABLED
        value: "true"

      # 스케줄 스캔 설정 (free tier 512MB 고려 — OOM/타임아웃·503 방지 위해 보수적으로)
      - key: SCHEDULED_SCAN_LIMIT
        value: "200"
      - key: SCHEDULED_SCAN_BATCH_SIZE
        value: "5"
      - key: SCHEDULED_SCAN_MAX_DURATION_SECONDS
        value: "1200"

      # 수동/백그라운드 스캔 설정
      - key: MANUAL_SCAN_LIMIT
        value: "100"
      - key: MANUAL_SCAN_BATCH_SIZE
        value: "5"
      - key: BACKGROUND_SCAN_LIMIT
        value: "50"
      - key: BACKGROUND_SCAN_BATCH_SIZE
        value: "5"
      - key: SCAN_MAX_DURATION_SECONDS
        value: "300"

      # CORS
      # Add your deployed frontend URL and keep localhost for local development.
      - key: ALLOWED_ORIGINS
        value: "https://stockcharthelper.vercel.app,https://frontend-mu-sooty-i4662dxm4r.vercel.app,http://localhost:5173"

      # KIS API
      # Leave blank if you want to rely on public sources only.
      - key: KIS_APP_KEY
        value: ""
      - key: KIS_APP_SECRET
        value: ""
      - key: KIS_ACCOUNT_NO
        value: ""
      - key: KIS_ENV
        value: "auto"

      # Security
      - key: SECRET_KEY
        generateValue: true
